services:
  web:
    image: hacktifytechnologies/teamcity-auth-bypass:latest
    container_name: hacktify-teamcity
    ports:
      - "8111:8111"
      - "5005:5005"
    environment:
      - TEAMCITY_SERVER_OPTS=-Dteamcity.startup.maintenance=false -Dteamcity.firstStart.setupAdmin.enabled=false -agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005
    restart: unless-stopped
